sites:
  mars:
    lat: 79.41833
    lon: -90.74750
    alt: 150

  nv:
    lat: 37.21333
    lon: -117.09111
    alt: 0

  alma:
    lat: -23.02917
    lon: -67.75500
    alt: 5050

  southpole:
    lat: -90.00000
    lon: 0.00000
    alt: 2800

  torres:
    lat: -50.00000
    lon: -73.00000
    alt: 0

beams:
  mars-csa2022-dip:
    site: mars
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"
    beam_az_rot: 10

  mars-csa2022-dip-horizon:
    site: mars
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"
    beam_az_rot: 10
    horizon_max_theta: 80

  mars-lake-dip:
    site: mars
    beam_file: "../../data/beam.npz"

  nv-dip:
    site: nv
    beam_file: "../../data/20240806_for_lisa/jackpot_beam2.npz"
    beam_az_rot: 64

  mars-mono-analytic:
    site: mars
    beam_type: "sin2"

  nv-mono-analytic:
    site: nv
    beam_type: "sin2"

  alma-csa2022-dip:
    site: alma
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"

  alma-mono-analytic:
    site: alma
    beam_type: "sin2"

  southpole-csa2022-dip:
    site: southpole
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"

  southpole-mono-analytic:
    site: southpole
    beam_type: "sin2"

  torres-csa2022-dip:
    site: torres
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"

  torres-mono-analytic:
    site: torres
    beam_type: "sin2"

defaults:
  sky:
    haslam_file: "../../data/haslam_galactic_mwss.npz"
    spectral_index: -2.55
    freq_range: [25, 126]
    freq_index: 0  # single-freq; remove to run all freqs
    # freq_indices: all  # or list like [0, 25, 50, 75, 100]

  observation:
    start_time: "2026-02-25 12:27"
    n_sidereal_days: 1.0
    n_times: 500
    lmax: 90

  svd:
    # n_singular_values (k): how many singular values the rSVD
    # *computes*. This is a computational budget, not how many
    # you keep — that is controlled by nvec_method/threshold.
    # Must be <= min(n_data, n_alm) where n_data = n_sites *
    # n_times. Exceeding the operator rank wastes computation
    # but does not cause errors.
    n_singular_values: 800

    # nvec_method: how to select which modes to keep.
    #   "threshold" (default) — keep sigma > threshold
    #   "manual"   — fixed nvec (set nvec: N)
    #   "auto"     — elbow detection on log(sigma)
    # nvec_method: threshold
    # threshold: 1.0e-10

  posterior:
    n_realizations: 1000
    seed: 1420

  output:
    results_dir: "../results"
    notebooks_dir: "../notebooks_out"
    generate_notebook: true

runs:
  # === Nominal comparison set (7 runs) ===

  mars:  # Group 1: 2 beams, max rank = 1000
    run_name: mars
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic

  mars-nv:  # Groups 1+2: 4 beams, max rank = 2000
    run_name: mars-nv
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
    svd:
      n_singular_values: 1200

  mars-lake:  # Groups 1+3: 3 beams, max rank = 1500
    run_name: mars-lake
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - mars-lake-dip
    svd:
      n_singular_values: 1200

  mars-nv-lake:  # Groups 1+2+3: 5 beams, max rank = 2500
    run_name: mars-nv-lake
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
      - mars-lake-dip
    svd:
      n_singular_values: 1200

  mars-nv-lake-alma:  # Groups 1+2+3+4: 7 beams, max rank = 3500
    run_name: mars-nv-lake-alma
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
      - mars-lake-dip
      - alma-csa2022-dip
      - alma-mono-analytic
    svd:
      n_singular_values: 1200

  all-nominal:  # Groups 1+2+3+4+5: 9 beams, max rank = 4500
    run_name: all-nominal
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
      - mars-lake-dip
      - alma-csa2022-dip
      - alma-mono-analytic
      - torres-csa2022-dip
      - torres-mono-analytic
    svd:
      n_singular_values: 1200

  alma-torres:  # Groups 4+5: 4 beams, max rank = 2000
    run_name: alma-torres
    beams:
      - alma-csa2022-dip
      - alma-mono-analytic
      - torres-csa2022-dip
      - torres-mono-analytic
    svd:
      n_singular_values: 1200

  # === lmax convergence test (MARS only) ===

  mars-lmax40:
    run_name: mars-lmax40
    beams: [mars-csa2022-dip, mars-mono-analytic]
    observation:
      lmax: 40
    svd:
      n_singular_values: 800

  mars-lmax60:
    run_name: mars-lmax60
    beams: [mars-csa2022-dip, mars-mono-analytic]
    observation:
      lmax: 60
    svd:
      n_singular_values: 800

  mars-lmax90:
    run_name: mars-lmax90
    beams: [mars-csa2022-dip, mars-mono-analytic]
    observation:
      lmax: 90
    svd:
      n_singular_values: 800

  mars-lmax179:
    run_name: mars-lmax179
    beams: [mars-csa2022-dip, mars-mono-analytic]
    observation:
      lmax: 179
    svd:
      n_singular_values: 800
