sites:
  mars:
    lat: 79.41833
    lon: -90.74750
    alt: 150

  nv:
    lat: 37.21333
    lon: -117.09111
    alt: 0

  alma:
    lat: -23.02917
    lon: -67.75500
    alt: 5050

  southpole:
    lat: -90.00000
    lon: 0.00000
    alt: 2800

beams:
  mars-csa2022-dip:
    site: mars
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"
    beam_az_rot: 10

  mars-csa2022-dip-horizon:
    site: mars
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"
    beam_az_rot: 10
    horizon_max_theta: 80

  mars-lake-dip:
    site: mars
    beam_file: "../../data/beam.npz"

  nv-dip:
    site: nv
    beam_file: "../../data/20240806_for_lisa/jackpot_beam2.npz"
    beam_az_rot: 64

  mars-mono-analytic:
    site: mars
    beam_type: "sin2"

  nv-mono-analytic:
    site: nv
    beam_type: "sin2"

  alma-csa2022-dip:
    site: alma
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"

  alma-mono-analytic:
    site: alma
    beam_type: "sin2"

  southpole-csa2022-dip:
    site: southpole
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"

  southpole-mono-analytic:
    site: southpole
    beam_type: "sin2"

defaults:
  sky:
    haslam_file: "../../data/haslam_galactic_mwss.npz"
    spectral_index: -2.55
    freq_range: [25, 126]
    freq_index: 0  # single-freq; remove to run all freqs
    # freq_indices: all  # or list like [0, 25, 50, 75, 100]

  observation:
    start_time: "2026-02-25 12:27"
    n_sidereal_days: 1.0
    n_times: 500
    lmax: 179

  svd:
    # n_singular_values (k): how many singular values the rSVD
    # *computes*. This is a computational budget, not how many
    # you keep — that is controlled by nvec_method/threshold.
    # Must be <= min(n_data, n_alm) where n_data = n_sites *
    # n_times. Exceeding the operator rank wastes computation
    # but does not cause errors.
    n_singular_values: 800

    # nvec_method: how to select which modes to keep.
    #   "threshold" (default) — keep sigma > threshold
    #   "manual"   — fixed nvec (set nvec: N)
    #   "auto"     — elbow detection on log(sigma)
    # nvec_method: threshold
    # threshold: 1.0e-10

  posterior:
    n_realizations: 1000
    seed: 1420

  output:
    results_dir: "../results"
    notebooks_dir: "../notebooks_out"
    generate_notebook: true

runs:
  mars-dip-multifreq:  # 1 site: max rank = 500
    beams: [mars-csa2022-dip]
    sky:
      freq_indices: all
    svd:
      n_singular_values: 500

  mars-nv:  # 2 sites: max rank = 1000
    beams: [mars-csa2022-dip, nv-dip]
    svd:
      n_singular_values: 1000

  mars-nv-multifreq:  # 2 sites: max rank = 1000
    beams: [mars-csa2022-dip, nv-dip]
    sky:
      freq_indices: all
    svd:
      n_singular_values: 1000

  mars-nv-mono:  # 3 sites: max rank = 1500
    beams: [mars-csa2022-dip, nv-dip, nv-mono-analytic]
    svd:
      n_singular_values: 1500

  mars-nv-alma:  # 3 sites: max rank = 1500
    beams: [mars-csa2022-dip, alma-csa2022-dip, nv-dip]
    svd:
      n_singular_values: 1500

  mars-nv-4beam:  # 4 sites: max rank = 2000
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
    svd:
      n_singular_values: 2000

  south-4beam:  # 4 sites: max rank = 2000
    beams:
      - alma-csa2022-dip
      - alma-mono-analytic
      - southpole-csa2022-dip
      - southpole-mono-analytic
    svd:
      n_singular_values: 2000

  mist-sites:  # 6 sites: max rank = 3000
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
      - alma-csa2022-dip
      - alma-mono-analytic
    svd:
      n_singular_values: 2000

  all-sites:  # 8 sites: max rank = 4000
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
      - alma-csa2022-dip
      - alma-mono-analytic
      - southpole-csa2022-dip
      - southpole-mono-analytic
    svd:
      n_singular_values: 2000
