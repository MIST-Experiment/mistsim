sites:
  mars:
    lat: 79.41833
    lon: -90.74750
    alt: 150

  nv:
    lat: 37.21333
    lon: -117.09111
    alt: 0

  alma:
    lat: -23.02917
    lon: -67.75500
    alt: 5050

beams:
  mars-csa2022-dip:
    site: mars
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"
    beam_az_rot: 80

  mars-csa2022-dip-horizon:
    site: mars
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"
    beam_az_rot: 80
    horizon_max_theta: 80

  mars-lake-dip:
    site: mars
    beam_file: "../../data/beam.npz"

  nv-dip:
    site: nv
    beam_file: "../../data/20240806_for_lisa/jackpot_beam2.npz"
    beam_az_rot: 26

  mars-mono-analytic:
    site: mars
    beam_type: "sin2"

  nv-mono-analytic:
    site: nv
    beam_type: "sin2"

  alma-csa2022-dip:
    site: alma
    beam_file: "../../data/20240806_for_lisa/csa2022_beam2.npz"

  alma-mono-analytic:
    site: alma
    beam_type: "sin2"

defaults:
  sky:
    haslam_file: "../../data/haslam_galactic.npz"
    spectral_index: -2.55
    freq_range: [25, 126]
    freq_index: 0  # single-freq; remove to run all freqs
    # freq_indices: all  # or list like [0, 25, 50, 75, 100]

  observation:
    start_time: "2026-02-25 12:27"
    n_sidereal_days: 1.0
    n_times: 500
    lmax: 179

  posterior:
    n_realizations: 1000
    seed: 1420

  output:
    results_dir: "../results"
    notebooks_dir: "../notebooks_out"
    generate_notebook: true

runs:
  mars-nv:
    beams: [mars-csa2022-dip, nv-dip]
    svd:
      n_singular_values: 800

  mars-nv-multifreq:
    beams: [mars-csa2022-dip, nv-dip]
    sky:
      freq_indices: all
    svd:
      n_singular_values: 800

  mars-nv-mono:
    beams: [mars-csa2022-dip, nv-dip, nv-mono-analytic]
    svd:
      n_singular_values: 1200

  mars-nv-alma:
    beams: [mars-csa2022-dip, alma-csa2022-dip, nv-dip]
    svd:
      n_singular_values: 1200

  mars-nv-4beam:
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
    svd:
      n_singular_values: 1500

  all-sites:
    beams:
      - mars-csa2022-dip
      - mars-mono-analytic
      - nv-dip
      - nv-mono-analytic
      - alma-csa2022-dip
      - alma-mono-analytic
    svd:
      n_singular_values: 1500

  test-compare-old:
    # Reproduce the old mars-dip_nv-dip.npz results.
    # Uses horizon-masked variant of the MARS CSA2022 beam.
    run_name: "test-compare-old-mars-dip-nv-dip"
    beams: [mars-csa2022-dip-horizon, nv-dip]
    svd:
      n_singular_values: 800
    output:
      generate_notebook: false
